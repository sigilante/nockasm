name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  python:
    name: python suites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install pinochle
        run: pip install 'pinochle>=1.2.1'
      - name: unit tests
        run: python tests/test_nockasm.py
      - name: end-to-end (pinochle)
        run: python tests/test_e2e.py
      - name: benchmark transcriptions
        run: python tests/test_benchmarks.py
      - name: target-IR round-trip law
        run: python tests/test_render.py
      - name: jam/cue + lift soundness
        run: if [ -f tests/test_lift.py ]; then python tests/test_lift.py; fi

  hoon:
    name: hoon differential (urbit eval)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # The latest release vere, deliberately unpinned: this suite is
      # differential against the platform, so a new vere/hoon breaking
      # it is exactly the signal we want.
      - name: install vere
        run: |
          curl -sL https://urbit.org/install/linux-x86_64/latest -o vere.tgz
          tar xzf vere.tgz
          mv vere-v* urbit
          chmod +x urbit
          ./urbit --version || true
      - name: differential suite (expand + render parity + round-trip)
        run: URBIT_BIN=./urbit python tests/test_hoon.py
      - name: desk tests under eval shim
        run: URBIT_BIN=./urbit python tests/test_desk.py
      - name: nasm clay mark
        run: if [ -f tests/test_mark.py ]; then URBIT_BIN=./urbit python tests/test_mark.py; fi

  nasmc:
    name: nasmc differential (nockvm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # toolchain comes from nasmc/rust-toolchain.toml (pinned nightly;
      # nockvm uses unstable features)
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: nasmc
      - name: build nasmc
        # run from nasmc/ so rustup picks up its rust-toolchain.toml
        working-directory: nasmc
        # nockchain's `nockup` crate ships template manifests
        # (name = "{{project_name}}") that cargo parses while resolving
        # our git dependency and errors on -- harmlessly: the build
        # still finishes and cargo exits 0. Strip that one known block
        # from the log so a passing build reads clean. pipefail keeps
        # cargo's own exit status, so a real build error still fails.
        run: |
          set -o pipefail
          cargo build --release 2>&1 | sed '/package name: .*project_name/,/\^/d'
      - name: differential suite (jam parity vs python oracle)
        run: python tests/test_nasmc.py
